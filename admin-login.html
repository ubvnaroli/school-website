<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>એડમિન લોગિન | શાળા વેબસાઇટ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', 'Nirmala UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 90%;
        }
        .login-box h2 {
            color: #1a237e;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }
        .form-group input:focus {
            border-color: #ffd700;
            outline: none;
        }
        .btn-login {
            background: linear-gradient(135deg, #1a237e, #283593);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .error {
            background: #f44336;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2><i class="fas fa-user-shield"></i> એડમિન લોગિન</h2>
        <div class="error" id="error">યુઝરનેમ અથવા પાસવર્ડ ખોટો છે</div>
        <form onsubmit="return login()">
            <div class="form-group">
                <label>યુઝરનેમ</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label>પાસવર્ડ</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">લોગિન કરો</button>
        </form>
    </div>
    
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // સિમ્પલ લોગિન (તમે તમારા પાસવર્ડ બદલી શકો છો)
            if (username === 'admin' && password === 'naroli@123') {
                window.location.href = 'admin-panel.php';
                return false;
            } else {
                document.getElementById('error').style.display = 'block';
                return false;
            }
        }
    </script>
</body>
</html>
