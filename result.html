<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<title>પરિણામ | UBV Naroli</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.box{max-width:95%;background:#fff;margin:60px auto;padding:20px;border-radius:10px}
h2{text-align:center;color:#1a2980}
input,button{padding:10px;font-size:16px}
button{background:#1a2980;color:#fff;border:none;border-radius:5px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px;font-size:14px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#1a2980;color:#fff}
.error{color:red;text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="box">
<h2>વિદ્યાર્થી પરિણામ (GR નંબર દ્વારા)</h2>

<input type="text" id="gr" placeholder="GR નંબર લખો">
<button onclick="search()">પરિણામ જુઓ</button>

<div id="msg" class="error"></div>
<div id="output"></div>
</div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1ZTgo_1Li-l4FtSsyJvLJC6gs5rYpS7r2/export?format=csv&gid=1023437449";

async function search(){
  document.getElementById("msg").innerHTML="";
  document.getElementById("output").innerHTML="";

  let gr=document.getElementById("gr").value.trim();
  if(!gr){document.getElementById("msg").innerHTML="GR નંબર નાખો";return;}

  let csv=await fetch(SHEET_URL).then(r=>r.text());
  let rows=csv.split("\n").map(r=>r.split(","));

  // Header row (બીજી row actual column names છે)
  let headers = rows[1];

  for(let i=2;i<rows.length;i++){
    if(rows[i][1] && rows[i][1].trim()===gr){
      let html="<table><tr>";
      headers.forEach(h=>html+=`<th>${h}</th>`);
      html+="</tr><tr>";
      rows[i].forEach(c=>html+=`<td>${c}</td>`);
      html+="</tr></table>";
      document.getElementById("output").innerHTML=html;
      return;
    }
  }
  document.getElementById("msg").innerHTML="પરિણામ મળ્યું નથી";
}
</script>

</body>
</html>
