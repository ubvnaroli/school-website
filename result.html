<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<title>પરિણામ પત્ર | UBV Naroli</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.box{max-width:900px;margin:20px auto;background:#fff;padding:20px;border:1px solid #333}
.search{text-align:center;margin-bottom:15px}
input,button{padding:8px;font-size:16px}
button{background:#1a2980;color:#fff;border:none;border-radius:4px}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #333;padding:6px;text-align:center}
.pass{color:green;font-weight:bold}
.fail{color:red;font-weight:bold}
@media print{.search,button{display:none}}
</style>
</head>

<body>

<div class="search">
  <input type="text" id="gr" placeholder="GR નંબર લખો">
  <button onclick="getResult()">પરિણામ જુઓ</button>
  <div id="msg" style="color:red"></div>
</div>

<div id="out" class="box" style="display:none">
  <h3 style="text-align:center">પરિણામ પત્ર (MARKSHEET)</h3>

  <table>
    <tr><th>વિદ્યાર્થીનું નામ</th><td id="name"></td></tr>
    <tr><th>GR નંબર</th><td id="grno"></td></tr>
    <tr><th>ધોરણ</th><td id="std"></td></tr>
    <tr><th>પરીક્ષા નંબર</th><td id="exam"></td></tr>
  </table>

  <table>
    <tr><th>વિષય</th><th>મેળવેલ ગુણ</th><th>ગ્રેડ</th></tr>
    <tr><td>ગુજરાતી</td><td id="g"></td><td id="gg"></td></tr>
    <tr><td>હિન્દી</td><td id="h"></td><td id="hg"></td></tr>
    <tr><td>અંગ્રેજી</td><td id="e"></td><td id="eg"></td></tr>
    <tr><td>સંસ્કૃત</td><td id="s"></td><td id="sg"></td></tr>
    <tr><td>સામાજિક વિજ્ઞાન</td><td id="ss"></td><td id="ssg"></td></tr>
    <tr><td>ગણિત</td><td id="m"></td><td id="mg"></td></tr>
    <tr><td>વિજ્ઞાન</td><td id="sc"></td><td id="scg"></td></tr>
    <tr><th>કુલ ગુણ</th><th id="total"></th><th></th></tr>
  </table>

  <p>
    પરિણામ : <span id="res"></span><br>
    ટકા : <b id="per"></b><br>
    રેન્ક : <b id="rank"></b>
  </p>

  <button onclick="window.print()">PRINT</button>
</div>

<script>
const URL="https://docs.google.com/spreadsheets/d/1ZTgo_1Li-l4FtSsyJvLJC6gs5rYpS7r2/export?format=csv&gid=1023437449";

async function getResult(){
  let gr=document.getElementById("gr").value.trim();
  if(!gr){msg("GR નંબર નાખો");return;}

  let csv=await fetch(URL).then(r=>r.text());
  let rows=csv.split("\n").map(r=>r.split(","));

  for(let i=0;i<rows.length;i++){
    let row=rows[i].map(x=>x.trim());
    if(row.includes(gr)){   // 🔥 GR column auto-detect
      fill(row);
      return;
    }
  }
  msg("પરિણામ મળ્યું નથી");
}

function fill(c){
  document.getElementById("out").style.display="block";
  document.getElementById("msg").innerText="";

  document.getElementById("grno").innerText=c[2];
  document.getElementById("exam").innerText=c[0];
  document.getElementById("std").innerText=c[4];
  document.getElementById("name").innerText=c[5]+" "+c[6];

  document.getElementById("g").innerText=c[12];
  document.getElementById("h").innerText=c[13];
  document.getElementById("e").innerText=c[14];
  document.getElementById("s").innerText=c[15];
  document.getElementById("ss").innerText=c[16];
  document.getElementById("m").innerText=c[17];
  document.getElementById("sc").innerText=c[18];

  document.getElementById("gg").innerText=c[22];
  document.getElementById("hg").innerText=c[23];
  document.getElementById("eg").innerText=c[24];
  document.getElementById("sg").innerText=c[25];
  document.getElementById("ssg").innerText=c[26];
  document.getElementById("mg").innerText=c[27];
  document.getElementById("scg").innerText=c[28];

  document.getElementById("total").innerText=c[30];
  document.getElementById("per").innerText=c[31];
  document.getElementById("rank").innerText=c[32];
  document.getElementById("res").innerHTML =
    c[33].includes("પાસ")?"<span class='pass'>પાસ</span>":"<span class='fail'>નાપાસ</span>";
}

function msg(t){document.getElementById("msg").innerText=t;}
</script>

</body>
</html>
