<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<title>પરિણામ | UBV Naroli</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:Arial;background:#f4f6f8}
header{background:#0b3c5d;color:#fff;text-align:center;padding:15px}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px}
input,button{padding:8px;font-size:15px}
button{background:#0b3c5d;color:#fff;border:none;border-radius:4px}
.hidden{display:none}
table{width:100%;border-collapse:collapse;margin-top:15px}
th,td{border:1px solid #000;padding:6px;text-align:center}
.pass{color:green;font-weight:bold}
.fail{color:red;font-weight:bold}
footer{text-align:center;font-size:13px;color:#555;padding:10px}
</style>
</head>

<body>

<header>
  <h2>ઉત્તર બુનિયાદી અને ઉચ્ચતર માધ્યમિક શાળા – નારોલી</h2>
  <div>Result Portal</div>
</header>

<div class="container">

<!-- REGISTRATION -->
<div id="regBox">
  <h3>📋 વિદ્યાર્થી નોંધણી</h3>
  <input id="rname" placeholder="વિદ્યાર્થીનું નામ"><br><br>
  <input id="rvillage" placeholder="ગામ"><br><br>
  <input id="rmobile" placeholder="મોબાઈલ નંબર"><br><br>
  <button onclick="register()">Register</button>
  <div id="regMsg" style="color:red"></div>
</div>

<!-- SEARCH -->
<div id="searchBox" class="hidden">
  <h3>🔍 પરિણામ શોધો</h3>
  <input id="gr" placeholder="GR નંબર લખો">
  <button onclick="findResult()">Search</button>
  <div id="msg" style="color:red"></div>
</div>

<!-- RESULT -->
<div id="resultBox" class="hidden">
  <h3 style="text-align:center">પરિણામ પત્ર</h3>

  <p>
    નામ: <b id="name"></b><br>
    GR: <b id="grno"></b><br>
    ધોરણ: <b id="std"></b> - <b id="div"></b>
  </p>

  <table>
    <tr><th>વિષય</th><th>ગુણ</th></tr>
    <tr><td>ગુજરાતી</td><td id="g"></td></tr>
    <tr><td>હિન્દી</td><td id="h"></td></tr>
    <tr><td>અંગ્રેજી</td><td id="e"></td></tr>
    <tr><td>સંસ્કૃત</td><td id="s"></td></tr>
    <tr><td>સામાજિક વિજ્ઞાન</td><td id="ss"></td></tr>
    <tr><td>ગણિત</td><td id="m"></td></tr>
    <tr><td>વિજ્ઞાન</td><td id="sc"></td></tr>
    <tr><th>કુલ ગુણ</th><th id="total"></th></tr>
  </table>

  <p>
    ટકા: <b id="per"></b>%<br>
    રેન્ક: <b id="rank"></b><br>
    પરિણામ: <span id="res"></span>
  </p>

  <button onclick="window.print()">PRINT</button>
</div>

</div>

<footer>© UBV Naroli School</footer>

<script>
let data=[];

// registration check
if(localStorage.getItem("reg_done")){
  regBox.style.display="none";
  searchBox.classList.remove("hidden");
}

// registration
function register(){
  let n=rname.value.trim(),
      v=rvillage.value.trim(),
      m=rmobile.value.trim();

  if(!n||!v||!m){
    regMsg.innerText="બધી માહિતી ભરો";
    return;
  }
  if(m.length!==10 || isNaN(m)){
    regMsg.innerText="માન્ય મોબાઈલ નંબર નાખો";
    return;
  }

  localStorage.setItem("reg_done","yes");
  regBox.style.display="none";
  searchBox.classList.remove("hidden");
}

// load CSV (static)
fetch("data/marks_current.csv")
.then(r=>r.text())
.then(t=>data=t.split("\n").map(x=>x.split(",")));

function findResult(){
  let grv=gr.value.trim();
  for(let i=1;i<data.length;i++){
    if(data[i][3]===grv){
      show(data[i]);
      return;
    }
  }
  msg.innerText="પરિણામ મળ્યું નથી";
}

function show(r){
  resultBox.classList.remove("hidden");
  set("name",r[4]); set("grno",r[3]);
  set("std",r[1]); set("div",r[2]);
  set("g",r[6]); set("h",r[7]); set("e",r[8]);
  set("s",r[9]); set("ss",r[10]);
  set("m",r[11]); set("sc",r[12]);
  set("total",r[13]); set("per",r[14]);
  set("rank",r[16]);
  res.innerHTML = r[15].includes("પાસ")
    ? "<span class='pass'>પાસ</span>"
    : "<span class='fail'>નાપાસ</span>";
}
function set(id,v){document.getElementById(id).innerText=v||""}
</script>

</body>
</html>
