<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>પરિણામ | UBV Naroli</title>

<style>
body{font-family:Arial;background:#f4f6f8;margin:0}
.box{max-width:420px;background:#fff;margin:80px auto;padding:25px;border-radius:10px;box-shadow:0 0 15px rgba(0,0,0,.1)}
h2{text-align:center;color:#1a2980}
input,button{width:100%;padding:12px;margin-top:12px;font-size:16px}
button{background:#1a2980;color:#fff;border:none;border-radius:6px;cursor:pointer}
button:hover{background:#142060}
.result{margin-top:20px}
table{width:100%;border-collapse:collapse;margin-top:15px}
td,th{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#1a2980;color:#fff}
.error{color:red;text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="box">
<h2>વિદ્યાર્થી પરિણામ</h2>

<input type="text" id="gr" placeholder="GR નંબર">
<input type="date" id="dob">

<button onclick="searchResult()">પરિણામ જુઓ</button>

<div id="msg" class="error"></div>
<div id="result" class="result"></div>
</div>

<script>
// 👉👉 અહીં તમારી Google Sheet CSV LINK મૂકhttps://docs.google.com/spreadsheets/d/e/2PACX-1vTYn_ojlBbKmFOgDJAPtYDfScO9aSe7SnFcKA8r0wHxPGSAwCPnRq6_M88RpECPWw/pub?output=csvો
const SHEET_URL = "PASTE_YOUR_GOOGLE_SHEET_CSV_LINK_HERE";

async function searchResult(){
  document.getElementById("msg").innerHTML="";
  document.getElementById("result").innerHTML="";

  let gr=document.getElementById("gr").value.trim();
  let dob=document.getElementById("dob").value;

  if(!gr || !dob){
    document.getElementById("msg").innerHTML="બન્ને માહિતી જરૂરી છે";
    return;
  }

  let data=await fetch(SHEET_URL).then(r=>r.text());
  let rows=data.split("\n");

  for(let i=1;i<rows.length;i++){
    let c=rows[i].split(",");
    if(c[0]==gr && c[1]==dob){
      document.getElementById("result").innerHTML=`
      <table>
        <tr><th>નામ</th><td>${c[2]}</td></tr>
        <tr><th>વર્ગ</th><td>${c[3]}</td></tr>
        <tr><th>ગુજરાતી</th><td>${c[4]}</td></tr>
        <tr><th>ગણિત</th><td>${c[5]}</td></tr>
        <tr><th>વિજ્ઞાન</th><td>${c[6]}</td></tr>
        <tr><th>કુલ</th><td>${c[7]}</td></tr>
      </table>`;
      return;
    }
  }
  document.getElementById("msg").innerHTML="પરિણામ મળ્યું નથી";
}
</script>

</body>
</html>
