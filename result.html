<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પરિણામ - યુ.બી.વી.નારોલી</title>
    <!-- CSS તમારું જ રાખો -->
    <style>
        /* તમારું CSS અહીં */
    </style>
</head>
<body>
    <!-- તમારું HTML અહીં -->

    <script>
        // CSV URL - તમારી પ્રકાશિત લિંક અહીં લગાવો
        // ઉદાહરણ: https://docs.google.com/spreadsheets/d/e/2PACX-1vT.../pub?output=csv
        const CSV_URL = 'તમારી_CSV_URL_અહીં_લગાવો';
        
        let studentsData = [];
        
        // CSV પાર્સ કરવાનું ફંક્શન
        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                
                // CSV values handle કરો
                const values = [];
                let currentValue = '';
                let inQuotes = false;
                
                for (let char of lines[i]) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(currentValue.trim());
                        currentValue = '';
                    } else {
                        currentValue += char;
                    }
                }
                values.push(currentValue.trim());
                
                const obj = {};
                for (let j = 0; j < headers.length; j++) {
                    obj[headers[j]] = values[j] || '';
                }
                
                data.push(obj);
            }
            
            return data;
        }
        
        // ડેટા લોડ કરો
        async function loadData() {
            try {
                showMessage('ડેટા લોડ થઈ રહ્યો છે...', 'success');
                
                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csvText = await response.text();
                studentsData = parseCSV(csvText);
                
                console.log('ડેટા લોડ થયો:', studentsData);
                showMessage('ડેટા તૈયાર છે', 'success');
                
                setTimeout(() => {
                    document.getElementById('searchMessage').style.display = 'none';
                }, 2000);
                
            } catch (error) {
                console.error('Error:', error);
                showMessage(`ત્રુટી: ${error.message}`, 'error');
                
                // Fallback: local JSON વાપરો
                try {
                    const fallbackResponse = await fetch('students.json');
                    const fallbackData = await fallbackResponse.json();
                    studentsData = fallbackData;
                    showMessage('Local ડેટા લોડ થયો', 'success');
                } catch (fallbackError) {
                    showMessage('કોઈ ડેટા લોડ થયો નથી', 'error');
                }
            }
        }
        
        // પેજ લોડ થાય ત્યારે
        window.addEventListener('load', function() {
            loadData();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('dob').value = today;
        });
        
        // ફોર્મ સબમિશન
        document.getElementById('resultSearchForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const grNumber = document.getElementById('grNumber').value.trim();
            const dob = document.getElementById('dob').value;
            
            if (!grNumber || !dob) {
                showMessage('કૃપા કરીને બંને ફીલ્ડ ભરો', 'error');
                return;
            }
            
            if (studentsData.length === 0) {
                showMessage('ડેટા હજુ લોડ થઈ રહ્યો છે...', 'error');
                return;
            }
            
            showMessage('શોધી રહ્યા છીએ...', 'success');
            
            // વિદ્યાર્થી શોધો
            const student = studentsData.find(s => {
                const studentGR = String(s.GR_No || s['જી.આર નંબર'] || s['GR Number'] || '').trim();
                const studentDOB = String(s['જન્મતારીખ'] || s.DOB || s['Date of Birth'] || '').trim();
                
                return studentGR === grNumber && studentDOB === dob;
            });
            
            if (student) {
                displayResult(student);
                showMessage('પરિણામ મળ્યું!', 'success');
            } else {
                showMessage('પરિણામ મળ્યું નથી', 'error');
            }
        });
        
        // બાકીના functions તમારા જેવા જ
    </script>
</body>
</html>
