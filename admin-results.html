<!-- Excel અપલોડ સેક્શન -->
<div class="upload-section">
    <h3>📊 Excel ફાઇલથી પરિણામ અપલોડ કરો</h3>
    
    <div style="background:#f5f5f5; padding:15px; border-radius:5px; margin:10px 0;">
        <h4>Excel ફાઇલ ફોર્મેટ:</h4>
        <ol>
            <li>કૉલમ: SeatNo, Name, Gujarati, Maths, Science, English, Sanskrit</li>
            <li>વૈકલ્પિક: Total, Percentage, Grade (ન હોય તો ઓટો ગણાશે)</li>
            <li>ફાઇલ ફોર્મેટ: .xlsx અથવા .xls</li>
        </ol>
        <a href="results_template.xlsx" download>📥 ટેમ્પલેટ ડાઉનલોડ કરો</a>
    </div>
    
    <input type="file" id="excelUpload" accept=".xlsx,.xls">
    <button onclick="uploadExcel()" style="background:#4CAF50; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">
        અપલોડ અને કન્વર્ટ કરો
    </button>
    
    <div id="uploadProgress" style="margin-top:10px;"></div>
    
    <div id="dataPreview" style="margin-top:20px;"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
async function uploadExcel() {
    const fileInput = document.getElementById('excelUpload');
    const file = fileInput.files[0];
    
    if (!file) {
        alert("કૃપા કરી Excel ફાઇલ પસંદ કરો");
        return;
    }
    
    const progress = document.getElementById('uploadProgress');
    progress.innerHTML = '<p>ફાઇલ પ્રોસેસ કરી રહ્યા છીએ... ⏳</p>';
    
    try {
        // FileReader વાપરીને Excel વાંચો
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            
            // પ્રથમ શીટ
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            
            // JSON માં કન્વર્ટ
            const excelJSON = XLSX.utils.sheet_to_json(worksheet);
            
            // ડેટા પ્રોસેસ
            const processedData = processExcelData(excelJSON);
            
            // પૂર્વાવલોકન દર્શાવો
            showDataPreview(processedData);
            
            // GitHub પર સેવ કરવાનો વિકલ્પ
            showSaveOptions(processedData);
            
            progress.innerHTML = '<p style="color:green;">✅ ફાઇલ સફળતાપૂર્વક પ્રોસેસ થઈ!</p>';
        };
        
        reader.onerror = function() {
            progress.innerHTML = '<p style="color:red;">❌ ફાઇલ વાંચવામાં ભૂલ આવી</p>';
        };
        
        reader.readAsArrayBuffer(file);
        
    } catch (error) {
        progress.innerHTML = `<p style="color:red;">❌ ભૂલ: ${error.message}</p>`;
    }
}

function processExcelData(data) {
    return data.map(row => {
        // જરૂરી ફીલ્ડઝ
        const seatNo = row.SeatNo || row['સીટ નંબર'] || '';
        const name = row.Name || row['નામ'] || '';
        
        // વિષયોના માર્ક્સ
        const gujarati = parseInt(row.Gujarati || row['ગુજરાતી'] || 0);
        const maths = parseInt(row.Maths || row['ગણિત'] || 0);
        const science = parseInt(row.Science || row['વિજ્ઞાન'] || 0);
        const english = parseInt(row.English || row['અંગ્રેજી'] || 0);
        const sanskrit = parseInt(row.Sanskrit || row['સંસ્કૃત'] || 0);
        
        // ગણતરીઓ
        const total = gujarati + maths + science + english + sanskrit;
        const percentage = (total / 5).toFixed(2);
        const grade = calculateGrade(percentage);
        
        return {
            seatNo: seatNo.toString(),
            name: name,
            gujarati: gujarati,
            maths: maths,
            science: science,
            english: english,
            sanskrit: sanskrit,
            total: total,
            percentage: parseFloat(percentage),
            grade: grade
        };
    });
}

function calculateGrade(percentage) {
    const perc = parseFloat(percentage);
    if (perc >= 90) return 'A1';
    if (perc >= 80) return 'A2';
    if (perc >= 70) return 'B1';
    if (perc >= 60) return 'B2';
    if (perc >= 50) return 'C1';
    if (perc >= 40) return 'C2';
    if (perc >= 33) return 'D';
    return 'E';
}

function showDataPreview(data) {
    const container = document.getElementById('dataPreview');
    let html = `<h4>પરિણામ પૂર્વાવલોકન (કુલ ${data.length} વિદ્યાર્થીઓ):</h4>`;
    
    html += '<table border="1" cellpadding="8" style="border-collapse:collapse; width:100%;">';
    html += '<tr style="background:#4CAF50; color:white;">';
    html += '<th>સીટ નંબર</th><th>નામ</th><th>કુલ</th><th>ટકાવારી</th><th>ગ્રેડ</th>';
    html += '</tr>';
    
    // પ્રથમ 10 રેકોર્ડ દર્શાવો
    data.slice(0, 10).forEach((student, index) => {
        const bgColor = index % 2 === 0 ? '#f9f9f9' : '#ffffff';
        html += `<tr style="background:${bgColor}">`;
        html += `<td>${student.seatNo}</td>`;
        html += `<td>${student.name}</td>`;
        html += `<td>${student.total}</td>`;
        html += `<td>${student.percentage}%</td>`;
        html += `<td>${student.grade}</td>`;
        html += '</tr>';
    });
    
    html += '</table>';
    
    if (data.length > 10) {
        html += `<p>... અને ${data.length - 10} વધુ વિદ્યાર્થીઓ</p>`;
    }
    
    container.innerHTML = html;
}

function showSaveOptions(data) {
    const container = document.getElementById('dataPreview');
    
    container.innerHTML += `
        <div style="margin-top:20px; padding:15px; background:#e8f5e9; border-radius:5px;">
            <h4>સંગ્રહ વિકલ્પો:</h4>
            
            <button onclick="downloadAsJSON(${JSON.stringify(data)})" 
                    style="background:#2196F3; color:white; padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer;">
                💾 JSON તરીકે ડાઉનલોડ કરો
            </button>
            
            <button onclick="saveToLocalStorage(${JSON.stringify(data)})" 
                    style="background:#FF9800; color:white; padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer;">
                📱 લોકલ સંગ્રહ કરો
            </button>
            
            <button onclick="copyToClipboard(${JSON.stringify(data)})" 
                    style="background:#9C27B0; color:white; padding:10px; margin:5px; border:none; border-radius:5px; cursor:pointer;">
                📋 ક્લિપબોર્ડ પર કોપી કરો
            </button>
        </div>
    `;
}

function downloadAsJSON(data) {
    const jsonString = JSON.stringify(data, null, 2);
    const blob = new Blob([jsonString], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = 'results.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    alert('JSON ફાઇલ ડાઉનલોડ શરૂ થઈ છે!');
}

function saveToLocalStorage(data) {
    localStorage.setItem('studentResults', JSON.stringify(data));
    alert('ડેટા લોકલ સંગ્રહમાં સેવ થયો!');
}

function copyToClipboard(data) {
    const jsonString = JSON.stringify(data, null, 2);
    navigator.clipboard.writeText(jsonString)
        .then(() => alert('JSON ડેટા ક્લિપબોર્ડ પર કોપી થયો!'))
        .catch(err => alert('કોપી કરવામાં ભૂલ: ' + err));
}
</script>
